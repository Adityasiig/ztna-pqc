<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ZTNA-PQC | Login</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="/static/style.css">
</head>

<body>
    <div class="login-wrap">
        <div class="login-header">
            <div class="brand-icon">🔐</div>
            <h1>ZTNA-PQC</h1>
            <p>Zero Trust Network Access — Post-Quantum Secured</p>
        </div>

        <div class="login-card">
            <label>Username</label>
            <input id="user" type="text" placeholder="Enter username" />

            <label>Password</label>
            <input id="pass" type="password" placeholder="Enter password" />

            <button id="login-btn" onclick="login()">Sign In</button>
            <div id="login-msg" class="msg"></div>
        </div>

        <div class="login-badges">
            <span class="badge green">Kyber-512 Encrypted</span>
            <span class="badge blue">Zero Trust Active</span>
            <span class="badge gray">TLS 1.3</span>
        </div>
    </div>

    <script src="/static/app.js"></script>
</body>

</html>
